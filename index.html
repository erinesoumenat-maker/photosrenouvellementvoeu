<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pellicule — Album Partagé</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --noir: #0d0d0d;
    --creme: #f2ede4;
    --or: #c9a84c;
    --or-pale: #e8c97a;
    --gris: #2a2a2a;
    --gris-clair: #3d3d3d;
    --rouge: #c0392b;
    --ombre: rgba(0,0,0,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--noir);
    color: var(--creme);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ÉCRANS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── ACCUEIL ── */
  #screenHome {
    align-items: center; justify-content: center;
    background: var(--noir);
    position: relative; overflow: hidden;
  }

  #screenHome::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .home-inner {
    display: flex; flex-direction: column; align-items: center;
    gap: 48px; padding: 48px 32px; position: relative; z-index: 1;
    max-width: 440px; width: 100%;
  }

  .home-brand { text-align: center; }

  .home-icon {
    width: 72px; height: 72px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }

  .home-icon::before {
    content: '';
    position: absolute; inset: 6px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 50%;
  }

  .home-icon svg { color: var(--or); }

  .home-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px; font-weight: 300;
    letter-spacing: -1px;
    line-height: 1;
  }

  .home-title em { font-style: italic; color: var(--or); }

  .home-sub {
    font-size: 9px; letter-spacing: 4px;
    color: rgba(242,237,228,0.3);
    text-transform: uppercase;
    margin-top: 10px;
  }

  .home-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }

  .btn-primary {
    padding: 18px 24px;
    background: var(--or);
    color: var(--noir);
    border: none; border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary:hover { background: var(--or-pale); transform: translateY(-1px); }

  .btn-secondary {
    padding: 16px 24px;
    background: transparent;
    color: rgba(242,237,228,0.4);
    border: 1px solid rgba(242,237,228,0.1);
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-secondary:hover { border-color: var(--or); color: var(--or); }

  /* ── LOGIN ── */
  #screenLogin {
    align-items: center; justify-content: center;
    background: var(--noir); gap: 0; padding: 48px 32px;
  }

  .login-box {
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300; font-style: italic;
    color: var(--creme); margin-bottom: 8px;
  }

  .login-input {
    width: 100%; padding: 16px;
    background: rgba(242,237,228,0.05);
    border: 1px solid rgba(242,237,228,0.12);
    color: var(--creme);
    font-family: 'Space Mono', monospace;
    font-size: 18px; letter-spacing: 6px;
    text-align: center; border-radius: 2px; outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--or); }
  .login-input::placeholder { letter-spacing: 3px; font-size: 12px; opacity: 0.4; }

  .login-error {
    color: var(--rouge); font-size: 10px; letter-spacing: 1px;
    text-align: center; display: none;
  }

  .btn-back-small {
    background: none; border: none;
    color: rgba(242,237,228,0.25); font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; text-align: center;
    padding: 8px; transition: color 0.2s;
  }
  .btn-back-small:hover { color: var(--creme); }

  /* ── INVITÉ ── */
  #screenGuest { background: #000; }

  .guest-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: rgba(0,0,0,0.8);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    position: relative; z-index: 10;
  }

  .guest-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-style: italic; color: var(--creme);
  }

  .sent-badge {
    font-size: 9px; letter-spacing: 2px;
    color: var(--or); text-transform: uppercase;
    background: rgba(201,168,76,0.1);
    padding: 5px 10px; border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .viewfinder {
    flex: 1; position: relative; overflow: hidden;
    background: #000; min-height: 50vh;
    display: flex; align-items: center; justify-content: center;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .vf-overlay {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 2;
  }

  .vf-corner {
    position: absolute; width: 24px; height: 24px;
    border-color: rgba(201,168,76,0.5); border-style: solid;
  }
  .vf-corner.tl { top:16px; left:16px; border-width:2px 0 0 2px; }
  .vf-corner.tr { top:16px; right:16px; border-width:2px 2px 0 0; }
  .vf-corner.bl { bottom:16px; left:16px; border-width:0 0 2px 2px; }
  .vf-corner.br { bottom:16px; right:16px; border-width:0 2px 2px 0; }

  .vf-center {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 44px; height: 44px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
  }

  .flash-overlay {
    position: absolute; inset: 0;
    background: white; opacity: 0;
    z-index: 20; pointer-events: none;
  }

  .flip-btn {
    position: absolute; top: 16px; right: 16px;
    z-index: 10; width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--creme);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(6px);
    transition: all 0.2s; pointer-events: all;
  }
  .flip-btn:hover { background: rgba(201,168,76,0.2); border-color: var(--or); }
  .flip-btn.spin svg { animation: spin 0.4s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-cam {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(242,237,228,0.2);
    gap: 12px; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase;
  }

  .guest-bottom {
    padding: 24px 24px 40px;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }

  .shutter-row {
    display: flex; align-items: center;
    justify-content: center; gap: 48px; width: 100%;
  }

  .shutter {
    width: 76px; height: 76px; border-radius: 50%;
    background: #000;
    border: 3px solid var(--or);
    cursor: pointer; position: relative;
    box-shadow: 0 0 0 6px rgba(201,168,76,0.1), 0 0 32px rgba(201,168,76,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .shutter::before {
    content: '';
    position: absolute; inset: 9px;
    border-radius: 50%;
    background: var(--or);
    transition: transform 0.1s;
  }
  .shutter:hover { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(201,168,76,0.15), 0 0 40px rgba(201,168,76,0.2); }
  .shutter:active { transform: scale(0.93); }
  .shutter:active::before { transform: scale(0.86); }
  .shutter:disabled { opacity: 0.4; cursor: not-allowed; }

  .flip-side {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(242,237,228,0.05);
    border: 1px solid rgba(242,237,228,0.1);
    color: rgba(242,237,228,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .flip-side:hover { border-color: var(--or); color: var(--or); }

  .upload-msg {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,237,228,0.25);
    min-height: 14px; text-align: center;
    transition: color 0.3s;
  }
  .upload-msg.loading { color: var(--or); }
  .upload-msg.success { color: #6abf69; }
  .upload-msg.error { color: var(--rouge); }

  canvas { display: none; }

  /* ── ADMIN ── */
  #screenAdmin { background: var(--creme); color: var(--noir); }

  .admin-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    background: var(--noir);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    position: sticky; top: 0; z-index: 100;
  }

  .admin-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 300; color: var(--creme);
  }
  .admin-logo em { font-style: italic; color: var(--or); }

  .nav-actions { display: flex; gap: 10px; }

  .nav-btn {
    padding: 9px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 2px; cursor: pointer;
    transition: all 0.2s; border: none;
  }
  .nav-btn-gold { background: var(--or); color: var(--noir); }
  .nav-btn-gold:hover { background: var(--or-pale); }
  .nav-btn-outline { background: transparent; border: 1px solid rgba(242,237,228,0.15); color: rgba(242,237,228,0.4); }
  .nav-btn-outline:hover { border-color: var(--rouge); color: var(--rouge); }
  .nav-btn-ghost { background: transparent; border: 1px solid rgba(242,237,228,0.1); color: rgba(242,237,228,0.3); }
  .nav-btn-ghost:hover { border-color: var(--or); color: var(--or); }

  .admin-body { padding: 36px 32px; max-width: 1300px; margin: 0 auto; }

  .album-info {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px;
  }

  .album-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 300;
    color: var(--noir);
  }
  .album-heading em { font-style: italic; color: var(--or); }

  .album-count {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(13,13,13,0.35);
  }

  /* Loading spinner */
  .spinner {
    display: flex; align-items: center; justify-content: center;
    padding: 80px; gap: 12px;
    color: rgba(13,13,13,0.3); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner-ring {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--or);
    animation: rotate 0.8s linear infinite;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  .photo-card {
    cursor: pointer;
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .photo-frame {
    position: relative; overflow: hidden;
    aspect-ratio: 4/3; border-radius: 2px;
    background: #ddd;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .photo-card:hover .photo-frame {
    transform: translateY(-4px) rotate(0.3deg);
    box-shadow: 0 14px 36px rgba(0,0,0,0.18);
  }
  .photo-frame img { width:100%; height:100%; object-fit:cover; display:block; }

  .photo-actions {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,13,13,0.8) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.25s;
    display: flex; align-items: flex-end; padding: 10px; gap: 7px;
  }
  .photo-card:hover .photo-actions { opacity: 1; }

  .pa-btn {
    flex: 1; padding: 8px 6px;
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; border: none;
    border-radius: 2px; cursor: pointer; transition: all 0.15s;
  }
  .pa-dl { background: var(--or); color: var(--noir); }
  .pa-dl:hover { background: var(--or-pale); }
  .pa-rm { background: rgba(192,57,43,0.85); color: white; }
  .pa-rm:hover { background: var(--rouge); }

  .photo-meta {
    padding: 8px 2px 2px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pm-num { font-size: 9px; color: var(--or); letter-spacing: 1px; }
  .pm-time { font-size: 9px; color: rgba(13,13,13,0.35); }

  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 80px 40px;
    color: rgba(13,13,13,0.2);
  }
  .empty-glyph {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px; opacity: 0.1; line-height: 1;
  }
  .empty p { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-top: 16px; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 1000; display: flex;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lb-img {
    max-width: 90vw; max-height: 88vh;
    object-fit: contain; border-radius: 2px;
    transform: scale(0.93); transition: transform 0.3s;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .lightbox.open .lb-img { transform: scale(1); }
  .lb-close {
    position: absolute; top: 20px; right: 28px;
    background: none; border: none; color: rgba(242,237,228,0.3);
    font-size: 28px; cursor: pointer; transition: color 0.2s;
  }
  .lb-close:hover { color: var(--creme); }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(242,237,228,0.06);
    border: 1px solid rgba(242,237,228,0.1);
    color: var(--creme); width: 48px; height: 48px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px; transition: all 0.2s;
  }
  .lb-nav:hover { background: rgba(201,168,76,0.2); border-color: var(--or); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--noir); color: var(--creme);
    padding: 12px 24px; border-radius: 2px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    border-left: 3px solid var(--or);
    transition: transform 0.3s ease;
    z-index: 9999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .admin-nav { padding: 14px 16px; }
    .nav-btn span { display: none; }
    .admin-body { padding: 20px 16px; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .album-heading { font-size: 30px; }
  }
</style>
</head>

    <div class="album-info">
      <div class="album-heading">Renou<em>vellement</em></div>
      <div class="album-count" id="albumCount">— photos</div>
    </div>
    <div id="photoGrid" class="photo-grid">
      <div class="spinner"><div class="spinner-ring"></div>Chargement...</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext">›</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config Cloudinary ──────────────────────────────────────────────
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
const CLOUDINARY_FETCH = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/`;
// Pour lister les photos on utilise le tag "pellicule"
const TAG = 'pellicule_album';

// ── Utilitaires ────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Navigation ─────────────────────────────────────────────────────
document.getElementById('btnGuest').addEventListener('click', () => {
  showScreen('screenGuest');
  startCamera();
});
document.getElementById('btnAdminGo').addEventListener('click', () => showScreen('screenLogin'));
document.getElementById('btnLoginBack').addEventListener('click', () => showScreen('screenHome'));
document.getElementById('btnLogout').addEventListener('click', () => showScreen('screenHome'));

// ── Login admin ────────────────────────────────────────────────────
function tryLogin() {
  const val = document.getElementById('loginInput').value;
  const err = document.getElementById('loginError');
  if (val === ADMIN_PASSWORD) {
    err.style.display = 'none';
    document.getElementById('loginInput').value = '';
    showScreen('screenAdmin');
    loadAlbum();
  } else {
    err.style.display = 'block';
    document.getElementById('loginInput').value = '';
  }
}
document.getElementById('btnLoginOk').addEventListener('click', tryLogin);
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

// ── Caméra ─────────────────────────────────────────────────────────
let stream = null;
let facingMode = 'environment';
let sentCount = 0;

async function startCamera(facing) {
  if (facing) facingMode = facing;
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = stream;
    v.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    v.style.display = 'block';
    document.getElementById('noCam').style.display = 'none';
  } catch(e) {
    document.getElementById('video').style.display = 'none';
    document.getElementById('noCam').style.display = 'flex';
  }
}

function doFlip() {
  [document.getElementById('flipBtn'), document.getElementById('flipSide')].forEach(b => {
    b.classList.add('spin');
    setTimeout(() => b.classList.remove('spin'), 420);
  });
  startCamera(facingMode === 'environment' ? 'user' : 'environment');
}
document.getElementById('flipBtn').addEventListener('click', doFlip);
document.getElementById('flipSide').addEventListener('click', doFlip);

// ── Capture & Upload Cloudinary ────────────────────────────────────
document.getElementById('shutterBtn').addEventListener('click', async () => {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const flash = document.getElementById('flash');
  const msg = document.getElementById('uploadMsg');
  const btn = document.getElementById('shutterBtn');

  if (!stream) { toast('Caméra non disponible'); return; }

  // Flash
  flash.style.transition = 'none';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.transition = 'opacity 0.7s'; flash.style.opacity = '0'; }, 60);

  // Capture sur canvas
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 960;
  if (facingMode === 'user') {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);

  // Upload
  btn.disabled = true;
  msg.textContent = 'Envoi en cours...';
  msg.className = 'upload-msg loading';

  try {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.88));
    const fd = new FormData();
    fd.append('file', blob, `photo_${Date.now()}.jpg`);
    fd.append('upload_preset', UPLOAD_PRESET);
    fd.append('tags', TAG);
    fd.append('folder', 'pellicule');

    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
    if (!res.ok) throw new Error('Upload échoué');

    sentCount++;
    const badge = document.getElementById('sentBadge');
    badge.textContent = sentCount + (sentCount > 1 ? ' photos envoyées' : ' photo envoyée');

    msg.textContent = '✓ Photo envoyée !';
    msg.className = 'upload-msg success';
  } catch(e) {
    msg.textContent = '✗ Erreur — réessayez';
    msg.className = 'upload-msg error';
    toast('Erreur d\'envoi — vérifiez votre connexion');
  } finally {
    btn.disabled = false;
    setTimeout(() => {
      msg.textContent = 'Appuyez pour photographier';
      msg.className = 'upload-msg';
    }, 3000);
  }
});

// ── Album admin ────────────────────────────────────────────────────
let adminPhotos = [];
let lbIndex = 0;

async function loadAlbum() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>';

  try {
    // Cloudinary Search API — liste les images avec le tag
    const res = await fetch(
      `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG}.json`,
      { cache: 'no-store' }
    );
    if (!res.ok) throw new Error('Erreur chargement');
    const data = await res.json();
    adminPhotos = (data.resources || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    renderGrid();
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-glyph">◎</div><p>Impossible de charger — vérifiez la connexion</p></div>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('photoGrid');
  const count = document.getElementById('albumCount');
  grid.innerHTML = '';
  count.textContent = adminPhotos.length + (adminPhotos.length > 1 ? ' photos' : ' photo');

  if (adminPhotos.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-glyph">◎</div><p>Aucune photo pour l\'instant</p></div>';
    return;
  }

  adminPhotos.forEach((photo, i) => {
    const d = new Date(photo.created_at);
    const time = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const date = d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    const thumbUrl = `${CLOUDINARY_FETCH}w_400,c_fill,q_auto/${photo.public_id}.jpg`;
    const fullUrl  = `${CLOUDINARY_FETCH}q_auto/${photo.public_id}.jpg`;

    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.animationDelay = Math.min(i * 0.04, 0.5) + 's';
    card.innerHTML = `
      <div class="photo-frame">
        <img src="${thumbUrl}" alt="Photo ${i+1}" loading="lazy">
        <div class="photo-actions">
          <button class="pa-btn pa-dl">↓ DL</button>
          <button class="pa-btn pa-rm">✕</button>
        </div>
      </div>
      <div class="photo-meta">
        <span class="pm-num">#${String(i+1).padStart(2,'0')}</span>
        <span class="pm-time">${date} ${time}</span>
      </div>
    `;

    card.querySelector('img').addEventListener('click', () => openLb(i));
    card.querySelector('.pa-dl').addEventListener('click', e => { e.stopPropagation(); dlPhoto(fullUrl, i); });
    card.querySelector('.pa-rm').addEventListener('click', e => { e.stopPropagation(); rmPhoto(photo.public_id, i); });

    grid.appendChild(card);
  });
}

function dlPhoto(url, i) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `pellicule-${String(i+1).padStart(3,'0')}.jpg`;
  a.target = '_blank';
  a.click();
  toast('Téléchargement démarré');
}

async function rmPhoto(publicId, i) {
  if (!confirm('Supprimer cette photo ?')) return;
  // Note : suppression via API nécessite une signature — on retire juste de l'affichage
  adminPhotos.splice(i, 1);
  renderGrid();
  toast('Photo retirée de l\'affichage');
}

// Download all
document.getElementById('btnDlAll').addEventListener('click', async () => {
  if (adminPhotos.length === 0) { toast('Album vide !'); return; }
  toast(`Téléchargement de ${adminPhotos.length} photos...`);
  for (let i = 0; i < adminPhotos.length; i++) {
    const url = `${CLOUDINARY_FETCH}q_auto/${adminPhotos[i].public_id}.jpg`;
    setTimeout(() => dlPhoto(url, i), i * 400);
  }
});

document.getElementById('btnRefresh').addEventListener('click', () => {
  toast('Actualisation...');
  loadAlbum();
});

// ── Lightbox ───────────────────────────────────────────────────────
function openLb(i) {
  lbIndex = i;
  const url = `${CLOUDINARY_FETCH}q_auto/${adminPhotos[i].public_id}.jpg`;
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}

document.getElementById('lbClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });

document.getElementById('lbPrev').addEventListener('click', () => {
  lbIndex = (lbIndex - 1 + adminPhotos.length) % adminPhotos.length;
  openLb(lbIndex);
});
document.getElementById('lbNext').addEventListener('click', () => {
  lbIndex = (lbIndex + 1) % adminPhotos.length;
  openLb(lbIndex);
});

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') lb.classList.remove('open');
  if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
});
</script>
</body>
</html>
